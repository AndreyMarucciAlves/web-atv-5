<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro</title>

    <style>
        body {
            background-color: #0263ff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 10px;
            background-color: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            border-radius: 24px;
        }
        
        form {
            border-radius: 20px;
            padding: 30px;
            border: 3px solid #1d5e75;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #1d5e75;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .campo-grupo {
            display: flex;
            flex-direction: column; 
            margin-bottom: 18px;
        }

        label {
            font-weight: bold;
            color: #1d5e75;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 4px;
            border: 2px solid #1d5e75;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #0263ff;
            box-shadow: 0 0 8px rgba(2, 99, 255, 0.3);
            outline: none;
        }

        .botao-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        button {
            width: 50%;
            padding: 12px;
            border-radius: 24px;
            border: 2px solid #1d5e75;
            background-color: transparent;
            color: #1d5e75;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;    
        }

        button:hover {
            background-color: #1d5e75;
            color: white;
        }
    </style>
    
</head>
<body>
    <div class="container">
        <form>
            <h1>Cadastro</h1>

            <div class="campo-grupo">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name">
            </div>

            <div class="campo-grupo">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>
            
            <div class="campo-grupo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" maxlength="16">
            </div>

            <div class="campo-grupo">
                <label for="confirmar-senha">Confirmar Senha:</label>
                <input type="password" id="confirmar-senha" name="confirmar-senha" maxlength="16">
            </div>

            <div class="campo-grupo">
                <label for="nascimento">Data de Nascimento:</label>
                <input type="date" id="nascimento" name="nascimento">
            </div>

            <div class="campo-grupo">
                <label for="curso">Curso:</label>
                <input type="text" id="curso" name="curso">
            </div>

            <div class="campo-grupo">
                <label for="sexo">Sexo:</label>
                <input type="text" id="sexo" name="sexo">
            </div>

            <div class="campo-grupo">
                <label for="interesses">Interesses:</label>
                <input type="text" id="interesses" name="interesses">
            </div>

            <div class="campo-grupo">
                <label for="comentarios">Comentários:</label>
                <input type="text" id="comentarios" name="comentarios" placeholder="Digite seus comentários...">
            </div>

            <div class="campo-grupo">
                <label for="upload-fotos">Upload de Fotos:</label>
                <input type="file" id="upload-fotos" name="upload-fotos">
            </div>

            <div class="botao-container">
                <button type="submit">Enviar</button>
            </div>
        </form>
    </div>
</body>
</html>
